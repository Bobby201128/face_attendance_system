<!-- ===== 环境管理页面 ===== -->
<div class="page" id="pageEnvironments">
    <div class="card">
        <div class="card-title">
            环境列表
            <button class="btn-small btn-primary" onclick="showAddEnvironmentModal()">+ 添加环境</button>
        </div>
        <div id="environmentsList">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<!-- ===== 分类管理页面 ===== -->
<div class="page" id="pageCategories">
    <div class="card">
        <div class="card-title">
            分类体系
            <button class="btn-small btn-primary" onclick="showAddCategoryModal()">+ 添加分类</button>
        </div>
        <div id="categoriesTree">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<!-- ===== 人脸审核页面 ===== -->
<div class="page" id="pageFaceApproval">
    <div class="card">
        <div class="card-title">
            待审核人脸
            <button class="btn-small btn-primary" onclick="loadPendingFaces()">刷新</button>
        </div>
        <div id="pendingFacesList">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<!-- ===== 环境编辑弹窗 ===== -->
<div class="modal-overlay" id="environmentModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="environmentModalTitle">添加环境</h2>
            <button class="modal-close" onclick="closeEnvironmentModal()">&times;</button>
        </div>
        <input type="hidden" id="editEnvironmentId">
        <div class="form-group">
            <label>环境名称 *</label>
            <input type="text" id="envName" placeholder="如：会议室A、工厂车间1">
        </div>
        <div class="form-group">
            <label>环境描述</label>
            <input type="text" id="envDescription" placeholder="环境用途说明">
        </div>
        <div class="form-group">
            <label>上班时间</label>
            <div style="display:flex;gap:8px;">
                <input type="number" id="envWorkStartHour" placeholder="时" min="0" max="23" value="9">
                <input type="number" id="envWorkStartMinute" placeholder="分" min="0" max="59" value="0">
            </div>
        </div>
        <div class="form-group">
            <label>下班时间</label>
            <div style="display:flex;gap:8px;">
                <input type="number" id="envWorkEndHour" placeholder="时" min="0" max="23" value="18">
                <input type="number" id="envWorkEndMinute" placeholder="分" min="0" max="59" value="0">
            </div>
        </div>
        <div class="form-group">
            <label>迟到宽限(分钟)</label>
            <input type="number" id="envLateGrace" value="15" min="0" max="120">
        </div>
        <div class="form-group">
            <label>签到模式</label>
            <select id="envSignMode">
                <option value="auto">自动签到</option>
                <option value="manual">手动签到</option>
            </select>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" id="envIsDefault"> 设为默认环境
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" id="envIsActive" checked> 启用该环境
            </label>
        </div>
        <button class="btn btn-primary" onclick="saveEnvironment()">保存</button>
    </div>
</div>

<!-- ===== 分类编辑弹窗 ===== -->
<div class="modal-overlay" id="categoryModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="categoryModalTitle">添加分类</h2>
            <button class="modal-close" onclick="closeCategoryModal()">&times;</button>
        </div>
        <input type="hidden" id="editCategoryId">
        <div class="form-group">
            <label>分类名称 *</label>
            <input type="text" id="categoryName" placeholder="如：北京分公司、研发部">
        </div>
        <div class="form-group">
            <label>分类层级 *</label>
            <select id="categoryLevel" onchange="loadParentCategories()">
                <option value="1">Level 1 - 集团</option>
                <option value="2">Level 2 - 公司/分公司</option>
                <option value="3">Level 3 - 部门</option>
                <option value="4">Level 4 - 小组</option>
            </select>
        </div>
        <div class="form-group" id="parentCategoryGroup" style="display:none;">
            <label>上级分类</label>
            <select id="categoryParentId">
                <option value="">无</option>
            </select>
        </div>
        <div class="form-group">
            <label>排序</label>
            <input type="number" id="categorySortOrder" value="0" min="0">
        </div>
        <div class="form-group">
            <label>描述</label>
            <input type="text" id="categoryDescription" placeholder="分类说明">
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" id="categoryIsActive" checked> 启用该分类
            </label>
        </div>
        <button class="btn btn-primary" onclick="saveCategory()">保存</button>
    </div>
</div>

<!-- ===== 人脸审核弹窗 ===== -->
<div class="modal-overlay" id="faceDetailModal">
    <div class="modal" style="max-width:400px;">
        <div class="modal-header">
            <h2>人脸审核</h2>
            <button class="modal-close" onclick="closeFaceDetailModal()">&times;</button>
        </div>
        <div id="faceDetailContent">
            <div style="text-align:center;">
                <img id="faceDetailImage" style="max-width:100%;border-radius:8px;margin-bottom:16px;">
                <p id="faceDetailPerson" style="font-weight:600;margin-bottom:8px;"></p>
                <p id="faceDetailTime" style="color:var(--text-light);font-size:13px;"></p>
            </div>
            <div class="form-group">
                <label>拒绝原因（如拒绝）</label>
                <input type="text" id="faceRejectReason" placeholder="请输入拒绝原因">
            </div>
            <div style="display:flex;gap:8px;margin-top:16px;">
                <button class="btn" style="flex:1;background:var(--danger);color:white;" onclick="rejectCurrentFace()">拒绝</button>
                <button class="btn btn-primary" style="flex:1;" onclick="approveCurrentFace()">批准</button>
            </div>
        </div>
    </div>
</div>

<script>
// ========== 环境管理 ==========

let currentFaceId = null;

function loadEnvironments() {
    api('/api/environments', function(data) {
        const list = document.getElementById('environmentsList');
        if (!data.environments || data.environments.length === 0) {
            list.innerHTML = '<div class="empty"><div class="icon">&#x1F3E0;</div><p>暂无环境</p></div>';
            return;
        }

        let html = '';
        data.environments.forEach(env => {
            const defaultBadge = env.default_env ? '<span style="background:var(--primary);color:white;padding:2px 8px;border-radius:4px;font-size:11px;">默认</span>' : '';
            const activeBadge = env.is_active ? '' : '<span style="background:var(--text-light);color:white;padding:2px 8px;border-radius:4px;font-size:11px;">已禁用</span>';

            html += `
                <div class="list-item" onclick="editEnvironment(${env.id})">
                    <div class="list-item-content">
                        <div class="list-item-title">${env.name} ${defaultBadge} ${activeBadge}</div>
                        <div class="list-item-desc">
                            ${env.description || '无描述'} | ${env.work_start_hour}:${String(env.work_start_minute).padStart(2,'0')} - ${env.work_end_hour}:${String(env.work_end_minute).padStart(2,'0')}
                        </div>
                    </div>
                    <button class="btn-icon" onclick="event.stopPropagation();deleteEnvironment(${env.id})" style="color:var(--danger);">&#x1F5D1;</button>
                </div>
            `;
        });
        list.innerHTML = html;
    });
}

function showAddEnvironmentModal() {
    document.getElementById('environmentModalTitle').textContent = '添加环境';
    document.getElementById('editEnvironmentId').value = '';
    document.getElementById('envName').value = '';
    document.getElementById('envDescription').value = '';
    document.getElementById('envWorkStartHour').value = '9';
    document.getElementById('envWorkStartMinute').value = '0';
    document.getElementById('envWorkEndHour').value = '18';
    document.getElementById('envWorkEndMinute').value = '0';
    document.getElementById('envLateGrace').value = '15';
    document.getElementById('envSignMode').value = 'auto';
    document.getElementById('envIsDefault').checked = false;
    document.getElementById('envIsActive').checked = true;
    showModal('environmentModal');
}

function editEnvironment(id) {
    api(`/api/environments/${id}`, function(data) {
        const env = data.environment;
        document.getElementById('environmentModalTitle').textContent = '编辑环境';
        document.getElementById('editEnvironmentId').value = env.id;
        document.getElementById('envName').value = env.name;
        document.getElementById('envDescription').value = env.description || '';
        document.getElementById('envWorkStartHour').value = env.work_start_hour;
        document.getElementById('envWorkStartMinute').value = env.work_start_minute;
        document.getElementById('envWorkEndHour').value = env.work_end_hour;
        document.getElementById('envWorkEndMinute').value = env.work_end_minute;
        document.getElementById('envLateGrace').value = env.late_grace_minutes;
        document.getElementById('envSignMode').value = env.sign_mode;
        document.getElementById('envIsDefault').checked = !!env.default_env;
        document.getElementById('envIsActive').checked = !!env.is_active;
        showModal('environmentModal');
    });
}

function saveEnvironment() {
    const id = document.getElementById('editEnvironmentId').value;
    const data = {
        name: document.getElementById('envName').value,
        description: document.getElementById('envDescription').value,
        work_start_hour: parseInt(document.getElementById('envWorkStartHour').value),
        work_start_minute: parseInt(document.getElementById('envWorkStartMinute').value),
        work_end_hour: parseInt(document.getElementById('envWorkEndHour').value),
        work_end_minute: parseInt(document.getElementById('envWorkEndMinute').value),
        late_grace_minutes: parseInt(document.getElementById('envLateGrace').value),
        sign_mode: document.getElementById('envSignMode').value,
        default_env: document.getElementById('envIsDefault').checked ? 1 : 0,
        is_active: document.getElementById('envIsActive').checked ? 1 : 0
    };

    if (!data.name) {
        alert('请输入环境名称');
        return;
    }

    const method = id ? 'PUT' : 'POST';
    const url = id ? `/api/environments/${id}` : '/api/environments';

    api(url, function(response) {
        closeModal('environmentModal');
        loadEnvironments();
        showToast(method === 'POST' ? '环境添加成功' : '环境更新成功');
    }, method, data);
}

function deleteEnvironment(id) {
    if (!confirm('确定要删除这个环境吗？')) return;

    api(`/api/environments/${id}`, function() {
        loadEnvironments();
        showToast('环境删除成功');
    }, 'DELETE');
}

function closeEnvironmentModal() {
    closeModal('environmentModal');
}

// ========== 分类管理 ==========

function loadCategories() {
    api('/api/categories/tree', function(data) {
        const tree = document.getElementById('categoriesTree');
        if (!data.tree || data.tree.length === 0) {
            tree.innerHTML = '<div class="empty"><div class="icon">&#x1F4C1;</div><p>暂无分类</p></div>';
            return;
        }

        let html = '';
        function renderCategory(cat, level = 0) {
            const indent = level * 20;
            const levelName = ['', '集团', '公司', '部门', '小组'][cat.level];
            html += `
                <div class="list-item" onclick="editCategory(${cat.id})" style="padding-left:${16 + indent}px;">
                    <div class="list-item-content">
                        <div class="list-item-title">
                            ${cat.name}
                            <span style="background:var(--primary);color:white;padding:2px 6px;border-radius:4px;font-size:10px;margin-left:8px;">${levelName}</span>
                        </div>
                        <div class="list-item-desc">${cat.description || '无描述'}</div>
                    </div>
                    <button class="btn-icon" onclick="event.stopPropagation();deleteCategory(${cat.id})" style="color:var(--danger);">&#x1F5D1;</button>
                </div>
            `;
            if (cat.children && cat.children.length > 0) {
                cat.children.forEach(child => renderCategory(child, level + 1));
            }
        }

        data.tree.forEach(cat => renderCategory(cat));
        tree.innerHTML = html;
    });
}

function showAddCategoryModal() {
    document.getElementById('categoryModalTitle').textContent = '添加分类';
    document.getElementById('editCategoryId').value = '';
    document.getElementById('categoryName').value = '';
    document.getElementById('categoryLevel').value = '1';
    document.getElementById('categorySortOrder').value = '0';
    document.getElementById('categoryDescription').value = '';
    document.getElementById('categoryIsActive').checked = true;
    loadParentCategories();
    showModal('categoryModal');
}

function editCategory(id) {
    api(`/api/categories/${id}`, function(data) {
        const cat = data.category;
        document.getElementById('categoryModalTitle').textContent = '编辑分类';
        document.getElementById('editCategoryId').value = cat.id;
        document.getElementById('categoryName').value = cat.name;
        document.getElementById('categoryLevel').value = cat.level;
        document.getElementById('categorySortOrder').value = cat.sort_order;
        document.getElementById('categoryDescription').value = cat.description || '';
        document.getElementById('categoryIsActive').checked = !!cat.is_active;
        loadParentCategories();
        setTimeout(() => {
            document.getElementById('categoryParentId').value = cat.parent_id || '';
        }, 100);
        showModal('categoryModal');
    });
}

function loadParentCategories() {
    const level = parseInt(document.getElementById('categoryLevel').value);
    const parentGroup = document.getElementById('parentCategoryGroup');

    if (level === 1) {
        parentGroup.style.display = 'none';
        return;
    }

    parentGroup.style.display = 'block';
    api(`/api/categories/level/${level - 1}`, function(data) {
        const select = document.getElementById('categoryParentId');
        select.innerHTML = '<option value="">无</option>';
        data.categories.forEach(cat => {
            select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
        });
    });
}

function saveCategory() {
    const id = document.getElementById('editCategoryId').value;
    const level = parseInt(document.getElementById('categoryLevel').value);
    const data = {
        name: document.getElementById('categoryName').value,
        level: level,
        parent_id: level > 1 ? document.getElementById('categoryParentId').value : null,
        sort_order: parseInt(document.getElementById('categorySortOrder').value),
        description: document.getElementById('categoryDescription').value,
        is_active: document.getElementById('categoryIsActive').checked ? 1 : 0
    };

    if (!data.name) {
        alert('请输入分类名称');
        return;
    }

    const method = id ? 'PUT' : 'POST';
    const url = id ? `/api/categories/${id}` : '/api/categories';

    api(url, function(response) {
        closeModal('categoryModal');
        loadCategories();
        showToast(method === 'POST' ? '分类添加成功' : '分类更新成功');
    }, method, data);
}

function deleteCategory(id) {
    if (!confirm('确定要删除这个分类吗？子分类也会被删除。')) return;

    api(`/api/categories/${id}`, function() {
        loadCategories();
        showToast('分类删除成功');
    }, 'DELETE');
}

function closeCategoryModal() {
    closeModal('categoryModal');
}

// ========== 人脸审核 ==========

function loadPendingFaces() {
    api('/api/faces/pending?page=1&per_page=20', function(data) {
        const list = document.getElementById('pendingFacesList');
        if (!data.faces || data.faces.length === 0) {
            list.innerHTML = '<div class="empty"><div class="icon">&#x1F4F8;</div><p>暂无待审核人脸</p></div>';
            return;
        }

        let html = '';
        data.faces.forEach(face => {
            html += `
                <div class="list-item" onclick="showFaceDetail(${face.id})">
                    <img src="data:image/jpeg;base64,${face.image_base64}" style="width:60px;height:60px;border-radius:8px;object-fit:cover;margin-right:12px;">
                    <div class="list-item-content">
                        <div class="list-item-title">${face.person_name}</div>
                        <div class="list-item-desc">
                            工号: ${face.employee_id || '无'} | ${new Date(face.created_at).toLocaleString()}
                        </div>
                    </div>
                    <div style="color:var(--warning);font-size:12px;">待审核</div>
                </div>
            `;
        });
        list.innerHTML = html;
    });
}

function showFaceDetail(faceId) {
    currentFaceId = faceId;
    api(`/api/faces/${faceId}`, function(data) {
        const face = data.face;
        document.getElementById('faceDetailImage').src = `data:image/jpeg;base64,${face.image_base64}`;
        document.getElementById('faceDetailPerson').textContent = face.person_name;
        document.getElementById('faceDetailTime').textContent = new Date(face.created_at).toLocaleString();
        document.getElementById('faceRejectReason').value = '';
        showModal('faceDetailModal');
    });
}

function approveCurrentFace() {
    if (!currentFaceId) return;
    api(`/api/faces/${currentFaceId}/approve`, function() {
        closeModal('faceDetailModal');
        loadPendingFaces();
        showToast('人脸已批准');
    }, 'PUT', {});
}

function rejectCurrentFace() {
    if (!currentFaceId) return;
    const reason = document.getElementById('faceRejectReason').value;
    api(`/api/faces/${currentFaceId}/reject`, function() {
        closeModal('faceDetailModal');
        loadPendingFaces();
        showToast('人脸已拒绝');
    }, 'PUT', { reason: reason });
}

function closeFaceDetailModal() {
    closeModal('faceDetailModal');
    currentFaceId = null;
}

// ========== 页面初始化 ==========

// 在设置页面添加入口
function addSettingsEntries() {
    const settingsPage = document.getElementById('pageSettings');
    if (settingsPage) {
        const newCards = `
            <div class="card">
                <div class="card-title">新功能管理</div>
                <div class="setting-item" onclick="switchPage('Environments');closeModal('settingsModal')">
                    <div>
                        <div class="setting-label">环境管理</div>
                        <div class="setting-desc">管理多个签到场景</div>
                    </div>
                    <button class="btn-icon" style="color:var(--primary);">&#x2794;</button>
                </div>
                <div class="setting-item" onclick="switchPage('Categories');closeModal('settingsModal')">
                    <div>
                        <div class="setting-label">分类管理</div>
                        <div class="setting-desc">四级分类体系</div>
                    </div>
                    <button class="btn-icon" style="color:var(--primary);">&#x2794;</button>
                </div>
                <div class="setting-item" onclick="switchPage('FaceApproval');closeModal('settingsModal')">
                    <div>
                        <div class="setting-label">人脸审核</div>
                        <div class="setting-desc">审核待批准的人脸照片</div>
                    </div>
                    <button class="btn-icon" style="color:var(--primary);">&#x2794;</button>
                </div>
            </div>
        `;

        // 插入到系统卡片之前
        const systemCard = settingsPage.querySelector('.card:last-of-type');
        if (systemCard && systemCard.textContent.includes('操作日志')) {
            systemCard.insertAdjacentHTML('beforebegin', newCards);
        }
    }
}

// 页面加载时执行
document.addEventListener('DOMContentLoaded', function() {
    // 添加新功能入口到设置页面
    setTimeout(addSettingsEntries, 500);

    // 添加页面切换支持
    const originalSwitchPage = window.switchPage;
    window.switchPage = function(pageName) {
        if (pageName === 'Environments') {
            loadEnvironments();
        } else if (pageName === 'Categories') {
            loadCategories();
        } else if (pageName === 'FaceApproval') {
            loadPendingFaces();
        }

        // 隐藏所有页面
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        // 显示目标页面
        const targetPage = document.getElementById('page' + pageName);
        if (targetPage) {
            targetPage.classList.add('active');
        }

        // 更新导航状态
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const navItem = document.querySelector(`.nav-item[onclick*="${pageName}"]`);
        if (navItem) navItem.classList.add('active');

        // 滚动到顶部
        window.scrollTo(0, 0);
    };
});
</script>
